<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Prime</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #f0f0f5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 14px rgba(245,158,11,0.4);
      flex-shrink: 0;
    }
    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fcd34d, #fef3c7, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #92400e;
      margin-top: 2px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #9191b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #0f0f1a;
      border: 1px solid #4a4a70;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #7c3aed;
    }
    button:disabled {
      background: #4a4a70;
      cursor: not-allowed;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.connected { background: #10b981; box-shadow: 0 0 8px #10b981; }
    .dot.disconnected { background: #ef4444; }
    #msg {
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
      min-height: 14px;
    }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    #notification-area { min-height: 18px; font-size: 12px; text-align: center; margin-bottom: 8px; }
    .note-success { color: #34d399; }
    .note-error { color: #f87171; }
    .diag { font-size: 11px; color: #9191b8; text-align: center; margin: -6px 0 10px; }
    #linked-state { display: none; }
    #unlinked-state { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">👑</div>
    <div>
      <h1>Capital Prime</h1>
      <div class="subtitle">Pix Dashboard</div>
      <div class="status" id="status-indicator">
        <div class="dot disconnected" id="dot"></div>
        <span id="status-text">Desconectado</span>
      </div>
      <div class="diag" id="line-diag">Extensao > VPS > Painel</div>
    </div>
  </div>

  <div id="unlinked-state" class="card">
    <label>API Key do Dashboard</label>
    <input type="text" id="api-key" placeholder="Cole sua API Key aqui..." />
    <button id="btn-link">Vincular Dispositivo</button>
  </div>

  <div id="linked-state" class="card">
    <p style="font-size: 13px; color: #b4b4cc; margin: 0 0 12px 0; text-align: center;">
      Extensão ativa e capturando QR Codes Pix automaticamente.
    </p>
    <button id="btn-test" style="background: #2563eb;">Testar Captura</button>
    <button id="btn-unlink" style="background: #ef4444; margin-top: 8px;">Desvincular</button>
  </div>

  <div id="notification-area"></div>
  <div id="msg"></div>

  <script type="module" src="./src/popup/popup.ts"></script>
</body>
</html>
