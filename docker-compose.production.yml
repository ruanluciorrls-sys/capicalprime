version: '3.8'

services:
  # ── Caddy (proxy reverso + HTTPS automatico) ────────────────
  caddy:
    image: caddy:2-alpine
    container_name: aios_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - dashboard
    networks:
      - aios_net

  # ── Backend NestJS ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: aios_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=${DB_USER:-aios}
      - DATABASE_PASS=${DB_PASS}
      - DATABASE_NAME=${DB_NAME:-aios_db}
      - DB_POOL_SIZE=20
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=30d
      - CORS_ORIGINS=${CORS_ORIGINS}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ASAAS_API_KEY=${ASAAS_API_KEY:-}
      - ASAAS_BASE_URL=${ASAAS_BASE_URL:-https://api.asaas.com/v3}
      # URL pública do backend — usada pelo extension.service.ts para gerar o ZIP da extensão
      # Sem isso, a extensão baixada do VPS aponta para localhost:3001 (errado)
      - BACKEND_URL=${PUBLIC_URL:-http://localhost:3001}
      # Força a URL pública da extensão (garante que o ZIP sempre aponte para o VPS, não localhost)
      - EXTENSION_FORCE_PUBLIC_ORIGIN=${EXTENSION_FORCE_PUBLIC_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aios_net

  # ── Dashboard Next.js ───────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
      args:
        # Aponta o dashboard para o backend na mesma máquina
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost}
        # Destino do proxy SSR (rewrites) gravado em build time. Service interno
        # do Docker, NUNCA a URL pública (que não resolve dentro do container).
        INTERNAL_API_URL: http://backend:3001
    container_name: aios_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - aios_net

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: aios_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aios}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME:-aios_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aios} -d ${DB_NAME:-aios_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - aios_net

volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  aios_net:
    driver: bridge
